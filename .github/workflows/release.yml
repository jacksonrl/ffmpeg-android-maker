name: Build and Release FFmpeg

on:
  workflow_dispatch:

# Required permission to create tags and releases via the GitHub CLI
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Environment Variables
        run: |
          # GitHub Actions' ubuntu-latest already provides the Android SDK and NDK.
          echo "ANDROID_SDK_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          
          # Find the latest installed NDK version dynamically
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n 1)
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

      - name: Install Required Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build build-essential \
            meson nasm pkg-config \
            autoconf automake libtool

      - name: Build FFmpeg for Android
        run: |
          # Executes your script to build FFmpeg for x86, x86_64, armeabi-v7a, arm64-v8a
          ./ffmpeg-android-maker.sh

      - name: Test FFmpeg executable on Android Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            # Create a workspace directory on the emulator
            adb shell mkdir -p /data/local/tmp/ffmpeg_test
            
            # Push the compiled shared libraries (.so) to the emulator
            adb push output/lib/x86_64/. /data/local/tmp/ffmpeg_test/lib/
            
            # Push the compiled executable
            adb push build/ffmpeg/x86_64/bin/ffmpeg /data/local/tmp/ffmpeg_test/
            
            # Make the binary executable
            adb shell chmod +x /data/local/tmp/ffmpeg_test/ffmpeg
            
            # Run the executable and print its version
            adb shell "LD_LIBRARY_PATH=/data/local/tmp/ffmpeg_test/lib /data/local/tmp/ffmpeg_test/ffmpeg -version"

      - name: Package Output Artifacts
        run: |
          # Compress the output libraries/headers meant for Android apps
          tar -czvf ffmpeg-android-output.tar.gz output/
          
          # Compress the generated standalone binaries (ffmpeg, ffprobe) for all ABIs
          tar -czvf ffmpeg-android-executables.tar.gz build/ffmpeg/*/bin/

      - name: Generate Release Tag
        id: date
        # Generates a tag like '2023.10.27-1430'
        run: echo "RELEASE_TAG=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Uses the GitHub CLI to create the release, tag the commit, and upload the tar files
          gh release create ${{ env.RELEASE_TAG }} \
            ffmpeg-android-output.tar.gz \
            ffmpeg-android-executables.tar.gz \
            --title "FFmpeg Android Build ${{ env.RELEASE_TAG }}" \
            --notes "Automated FFmpeg build for Android from commit ${{ github.sha }}" \
            --target ${{ github.sha }}
